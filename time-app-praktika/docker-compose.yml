services:
  db:
    image: mysql:8.0
    container_name: time-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: time_db
    ports:
      - "3307:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build: ./api
    container_name: time-db-api
    ports:
      - "5555:5555"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: time_db

  frontend:
    build: ./frontend
    container_name: time-db-frontend
    ports:
      - "8081:80"
    depends_on:
      - api